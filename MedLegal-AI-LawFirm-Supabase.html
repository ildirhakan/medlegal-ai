<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MedLegal-AI - Law Firm Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D1B2E; color: #F1F5F9; font-family: 'DM Sans', sans-serif; }
    
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0D1B2E; }
    .login-card { background: #142236; border: 1px solid #1E3A5F; border-radius: 14px; padding: 40px; width: 380px; }
    .login-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 4px; }
    .login-title span { color: #3B82F6; }
    .login-sub { font-size: 11px; color: #64748B; margin-bottom: 24px; text-align: center; }
    .login-error { background: rgba(220,38,38,0.12); color: #F87171; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 12px; }
    .login-hint { font-size: 11px; color: #64748B; text-align: center; margin-top: 16px; }
    
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 11px; color: #94A3B8; text-transform: uppercase; display: block; margin-bottom: 6px; }
    .form-input { width: 100%; background: #0D1B2E; border: 1px solid #1E3A5F; padding: 9px 12px; color: #F1F5F9; border-radius: 6px; font-size: 13px; }
    .form-input:focus { outline: none; border-color: #3B82F6; }
    
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-primary { background: #2B6CB0; color: white; width: 100%; }
    .btn-primary:hover { background: #2563EB; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .app { display: flex; height: 100vh; }
    .sidebar { width: 240px; background: #142236; border-right: 1px solid #1E3A5F; padding: 20px; display: flex; flex-direction: column; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 24px; }
    .logo span { color: #3B82F6; }
    
    .nav-item { padding: 9px 12px; margin-bottom: 6px; border-radius: 6px; cursor: pointer; font-size: 13px; border: 1px solid transparent; }
    .nav-item:hover { background: #1C3050; }
    .nav-item.active { background: rgba(59,130,246,0.15); color: #3B82F6; }
    
    .sidebar-user { margin-top: auto; padding-top: 16px; border-top: 1px solid #1E3A5F; }
    .user-name { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
    .user-role { font-size: 10px; color: #64748B; margin-bottom: 12px; }
    
    .topbar { padding: 20px 28px; border-bottom: 1px solid #1E3A5F; background: #142236; }
    .topbar-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
    .topbar-sub { font-size: 12px; color: #94A3B8; margin-top: 2px; }
    
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; }
    
    .card { background: #142236; border: 1px solid #1E3A5F; border-radius: 10px; padding: 20px; margin-bottom: 14px; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card { background: #142236; border: 1px solid #1E3A5F; border-radius: 10px; padding: 18px; position: relative; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: #3B82F6; }
    .stat-label { font-size: 10px; color: #64748B; margin-bottom: 8px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; }
    
    .upload-zone { border: 2px dashed #1E3A5F; border-radius: 10px; padding: 48px 24px; text-align: center; cursor: pointer; }
    .upload-zone:hover { border-color: #3B82F6; background: rgba(59,130,246,0.1); }
    
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th { text-align: left; padding: 10px 0; border-bottom: 1px solid #1E3A5F; font-size: 10px; text-transform: uppercase; color: #64748B; }
    td { padding: 12px 0; border-bottom: 1px solid rgba(30,58,95,0.5); font-size: 13px; }
    
    .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; }
    .badge-green { background: rgba(5,150,105,0.15); color: #34D399; }
    .badge-amber { background: rgba(217,119,6,0.15); color: #FCD34D; }
    
    .loading { text-align: center; padding: 20px; color: #94A3B8; }
    .empty { text-align: center; padding: 48px 24px; color: #94A3B8; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Supabase Config
    const SUPABASE_URL = 'https://nhotxxkehumweboxqkka.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3UKw258JCeGIsInKmz291w_Fc658oH3';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // App State
    let state = {
      loggedIn: false,
      firmId: null,
      firmName: null,
      page: 'dashboard',
      cases: [],
      selectedCase: null,
      loading: false,
      error: ''
    };

    // Render App
    async function render() {
      const app = document.getElementById('app');
      
      if (!state.loggedIn) {
        app.innerHTML = renderLogin();
        attachLoginListeners();
      } else {
        app.innerHTML = renderApp();
        attachAppListeners();
        if (state.cases.length === 0) {
          await loadCases();
        }
      }
    }

    function renderLogin() {
      return `
        <div class="login-screen">
          <div class="login-card">
            <div class="login-title">MedLegal<span>-AI</span></div>
            <div class="login-sub">Law Firm Portal</div>
            
            ${state.error ? `<div class="login-error">${state.error}</div>` : ''}
            
            <form id="login-form">
              <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-input" id="email" type="email" placeholder="harrison@harrisoncole.co.uk" required>
              </div>
              <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" id="password" type="password" placeholder="••••••••" required>
              </div>
              <button class="btn btn-primary" type="submit">Sign In</button>
            </form>
            
            <div class="login-hint">Demo: harrison@harrisoncole.co.uk / password123</div>
          </div>
        </div>
      `;
    }

    function renderApp() {
      return `
        <div class="app">
          <div class="sidebar">
            <div class="logo">MedLegal<span>-AI</span></div>
            
            <div class="nav-item ${state.page === 'dashboard' ? 'active' : ''}" onclick="changePage('dashboard')">📈 Overview</div>
            <div class="nav-item ${state.page === 'cases' ? 'active' : ''}" onclick="changePage('cases')">📋 My Cases (${state.cases.length})</div>
            <div class="nav-item ${state.page === 'upload' ? 'active' : ''}" onclick="changePage('upload')">↑ Upload Case</div>
            
            <div class="sidebar-user">
              <div class="user-name">${state.firmName}</div>
              <div class="user-role">Law Firm</div>
              <button class="btn btn-primary" onclick="logout()" style="padding: 5px 12px; font-size: 12px;">Sign Out</button>
            </div>
          </div>
          
          <div class="main">
            <div class="topbar">
              <div class="topbar-title">
                ${state.page === 'dashboard' ? 'Overview' : state.page === 'cases' ? 'My Cases' : 'Upload Case'}
              </div>
              <div class="topbar-sub">
                ${state.page === 'dashboard' ? 'Your case pipeline' : state.page === 'cases' ? `${state.cases.length} cases` : 'Submit medical records'}
              </div>
            </div>
            
            <div class="content">
              ${state.page === 'dashboard' ? renderDashboard() : ''}
              ${state.page === 'cases' ? renderCases() : ''}
              ${state.page === 'upload' ? renderUpload() : ''}
            </div>
          </div>
        </div>
      `;
    }

    function renderDashboard() {
      const pending = state.cases.filter(c => c.status === 'pending_review').length;
      const approved = state.cases.filter(c => c.status === 'approved').length;
      
      return `
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">Total Cases</div><div class="stat-value">${state.cases.length}</div></div>
          <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value">${pending}</div></div>
          <div class="stat-card"><div class="stat-label">Approved</div><div class="stat-value">${approved}</div></div>
          <div class="stat-card"><div class="stat-label">Action</div><button class="btn btn-primary" onclick="changePage('upload')" style="padding: 4px 8px; font-size: 11px;">+ Upload</button></div>
        </div>
        
        <div class="card">
          <div class="card-title">Recent Cases</div>
          ${state.cases.length === 0 ? '<div class="empty">No cases yet. Upload your first case.</div>' : `
            <table>
              <thead><tr><th>Reference</th><th>Type</th><th>Status</th></tr></thead>
              <tbody>
                ${state.cases.slice(0, 5).map(c => `
                  <tr onclick="selectCase(${c.id})">
                    <td style="font-family: 'DM Mono'; color: #3B82F6;">${c.reference}</td>
                    <td>${c.case_type}</td>
                    <td><span class="badge ${c.status === 'approved' ? 'badge-green' : 'badge-amber'}">${c.status}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `}
        </div>
      `;
    }

    function renderCases() {
      return `
        <div class="card">
          ${state.cases.length === 0 ? '<div class="empty">No cases uploaded yet.</div>' : `
            <table>
              <thead><tr><th>Reference</th><th>Type</th><th>Date</th><th>Status</th></tr></thead>
              <tbody>
                ${state.cases.map(c => `
                  <tr>
                    <td style="font-family: 'DM Mono'; color: #3B82F6;">${c.reference}</td>
                    <td>${c.case_type}</td>
                    <td style="font-family: 'DM Mono'; font-size: 11px;">${new Date(c.created_at).toLocaleDateString()}</td>
                    <td><span class="badge ${c.status === 'approved' ? 'badge-green' : 'badge-amber'}">${c.status}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `}
        </div>
      `;
    }

    function renderUpload() {
      return `
        <div style="max-width: 720px;">
          <div class="card">
            <div class="card-title">Submit New Case</div>
            <form id="upload-form">
              <div class="form-group">
                <label class="form-label">Case Type *</label>
                <select id="case-type" class="form-input" required>
                  <option value="">Select...</option>
                  <option>Surgical Negligence</option>
                  <option>Medication Error</option>
                  <option>Delayed Diagnosis</option>
                  <option>GP Negligence</option>
                  <option>Birth Injury</option>
                </select>
              </div>
              
              <div class="form-group">
                <label class="form-label">Case Summary</label>
                <textarea id="case-summary" class="form-input" style="min-height: 80px; resize: vertical;"></textarea>
              </div>
              
              <div class="form-group">
                <label class="form-label">Medical Records *</label>
                <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                  <div>📁 Click to upload files</div>
                  <div style="font-size: 11px; color: #94A3B8; margin-top: 6px;">PDF, JPG, PNG</div>
                </div>
                <input id="file-input" type="file" multiple style="display: none;">
              </div>
              
              <div id="file-list"></div>
              
              <button class="btn btn-primary" type="submit" id="submit-btn">Submit for Analysis →</button>
            </form>
          </div>
        </div>
      `;
    }

    // Event Listeners
    function attachLoginListeners() {
      document.getElementById('login-form').addEventListener('submit', handleLogin);
    }

    function attachAppListeners() {
      const uploadForm = document.getElementById('upload-form');
      if (uploadForm) {
        uploadForm.addEventListener('submit', handleUpload);
        document.getElementById('file-input').addEventListener('change', updateFileList);
      }
    }

    // Handlers
    async function handleLogin(e) {
      e.preventDefault();
      state.error = '';
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Demo auth
      if (email === 'harrison@harrisoncole.co.uk' && password === 'password123') {
        // Get firm from Supabase
        const { data: firms } = await supabase
          .from('firms')
          .select('*')
          .eq('email', email)
          .single();
        
        if (firms) {
          state.loggedIn = true;
          state.firmId = firms.id;
          state.firmName = firms.name;
          state.page = 'dashboard';
          await loadCases();
          render();
        }
      } else {
        state.error = 'Invalid credentials. Try: harrison@harrisoncole.co.uk / password123';
        render();
      }
    }

    async function handleUpload(e) {
      e.preventDefault();
      state.loading = true;
      
      const caseType = document.getElementById('case-type').value;
      const caseSummary = document.getElementById('case-summary').value;
      
      if (!caseType) {
        alert('Please select a case type');
        state.loading = false;
        return;
      }
      
      // Generate reference
      const ref = `MAI-2026-${String(state.cases.length + 1).padStart(4, '0')}`;
      
      // Insert to Supabase
      const { data, error } = await supabase
        .from('cases')
        .insert({
          reference: ref,
          firm_id: state.firmId,
          case_type: caseType,
          case_summary: caseSummary,
          status: 'pending_review',
          risk_score: Math.floor(Math.random() * 40 + 40),
          consistency_score: Math.floor(Math.random() * 30 + 65)
        });
      
      if (!error) {
        document.getElementById('upload-form').reset();
        document.getElementById('file-list').innerHTML = '';
        await loadCases();
        state.page = 'cases';
      } else {
        alert('Error uploading case: ' + error.message);
      }
      
      state.loading = false;
      render();
    }

    function updateFileList() {
      const files = document.getElementById('file-input').files;
      const list = document.getElementById('file-list');
      list.innerHTML = '';
      
      Array.from(files).forEach(f => {
        const div = document.createElement('div');
        div.style.cssText = 'padding: 8px; background: #0D1B2E; border-radius: 6px; margin-bottom: 8px; font-size: 12px;';
        div.innerHTML = `📄 ${f.name}`;
        list.appendChild(div);
      });
    }

    async function loadCases() {
      const { data } = await supabase
        .from('cases')
        .select('*')
        .eq('firm_id', state.firmId)
        .order('created_at', { ascending: false });
      
      state.cases = data || [];
    }

    function changePage(page) {
      state.page = page;
      render();
    }

    function selectCase(id) {
      state.selectedCase = state.cases.find(c => c.id === id);
      // Could show case detail here
    }

    async function logout() {
      state.loggedIn = false;
      state.firmId = null;
      state.firmName = null;
      state.cases = [];
      state.page = 'dashboard';
      state.error = '';
      render();
    }

    // Initial render
    render();
  </script>
</body>
</html>

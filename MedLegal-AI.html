<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>MedLegal-AI - Expert Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0D1B2E;color:#F1F5F9;font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1E3A5F;border-radius:2px}
.app{display:flex;height:100vh}.sidebar{width:250px;background:#142236;border-right:1px solid #1E3A5F;display:flex;flex-direction:column}
.sidebar-content{flex:1;overflow-y:auto;padding-top:12px}.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.logo{padding:24px 20px;border-bottom:1px solid #1E3A5F}.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}.logo-text span{color:#3B82F6}
.logo-sub{font-size:9px;color:#64748B;font-family:'DM Mono',monospace;letter-spacing:2px;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:0 10px 2px;border-radius:6px;cursor:pointer;font-size:13px;color:#94A3B8;border:1px solid transparent}
.nav-item:hover{background:#1C3050;color:#F1F5F9}.nav-item.active{background:rgba(59,130,246,.15);color:#3B82F6;border-color:rgba(59,130,246,.2)}
.nav-badge{margin-left:auto;background:#D97706;color:white;font-size:10px;padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace}
.nav-section{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:#64748B;padding:16px 10px 6px;text-transform:uppercase}
.sidebar-user{padding:16px;border-top:1px solid #1E3A5F}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2B6CB0,#0D9488);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px;margin-bottom:8px}
.user-name{font-size:12px;font-weight:600}.user-role{font-size:10px;color:#64748B;font-family:'DM Mono',monospace;margin-top:2px}
.topbar{padding:20px 28px;border-bottom:1px solid #1E3A5F;background:#142236;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.topbar-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}.topbar-sub{font-size:12px;color:#94A3B8;margin-top:2px;font-family:'DM Mono',monospace}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.card{background:#142236;border:1px solid #1E3A5F;border-radius:10px;padding:20px;margin-bottom:14px}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#142236;border:1px solid #1E3A5F;border-radius:10px;padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#3B82F6}
.stat-card.amber::before{background:#D97706}.stat-card.green::before{background:#059669}.stat-card.teal::before{background:#0D9488}
.stat-label{font-size:10px;color:#64748B;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;letter-spacing:-1px}
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-primary{background:#2B6CB0;color:white}.btn-primary:hover{background:#2563EB}
.btn-ghost{background:transparent;color:#94A3B8;border:1px solid #1E3A5F}.btn-ghost:hover{background:#1C3050;color:#F1F5F9}
.btn-teal{background:#0D9488;color:white}.btn-teal:hover{background:#0F766E}
.btn-red{background:rgba(220,38,38,.15);color:#F87171;border:1px solid rgba(220,38,38,.3)}.btn-red:hover{background:rgba(220,38,38,.25)}
.btn-sm{padding:5px 12px;font-size:12px}
table{width:100%;border-collapse:collapse}th{text-align:left;padding:10px 0;border-bottom:1px solid #1E3A5F;font-size:10px;text-transform:uppercase;color:#64748B;font-family:'DM Mono',monospace}
td{padding:12px 0;border-bottom:1px solid rgba(30,58,95,.5);font-size:13px}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-family:'DM Mono',monospace}
.badge-blue{background:rgba(59,130,246,.15);color:#3B82F6}.badge-green{background:rgba(5,150,105,.15);color:#34D399}
.badge-amber{background:rgba(217,119,6,.15);color:#FCD34D}.badge-red{background:rgba(220,38,38,.15);color:#F87171}
.empty{text-align:center;padding:48px 24px;color:#94A3B8}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.model-card{background:#0D1B2E;border:1px solid #1E3A5F;border-radius:8px;padding:16px;margin-bottom:12px}
.legal-test{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(30,58,95,.4);font-size:12px}
.legal-test:last-child{border-bottom:none}
.test-green{color:#34D399}.test-amber{color:#FCD34D}.test-red{color:#F87171}
.reasoning-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:6px;padding:12px;margin-top:10px;font-size:12px;color:#CBD5E1;line-height:1.6}
.rec-box{display:inline-block;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-top:8px}
.rec-proceed{background:rgba(5,150,105,.15);color:#34D399;border:1px solid rgba(5,150,105,.3)}
.rec-borderline{background:rgba(217,119,6,.15);color:#FCD34D;border:1px solid rgba(217,119,6,.3)}
.rec-decline{background:rgba(220,38,38,.15);color:#F87171;border:1px solid rgba(220,38,38,.3)}
.form-textarea{width:100%;background:#0D1B2E;border:1px solid #1E3A5F;padding:10px 12px;color:#F1F5F9;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;min-height:120px;resize:vertical}
.form-textarea:focus{outline:none;border-color:#3B82F6}
.review-card{background:#0D1B2E;border:1px solid #1E3A5F;border-radius:8px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .15s}
.review-card:hover{border-color:#2B6CB0;background:#142236}
/* LOGIN GATE */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative}
.login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(43,108,176,.12) 0%,transparent 60%)}
.login-card{background:#142236;border:1px solid #1E3A5F;border-radius:14px;padding:40px;width:400px;position:relative;z-index:1}
.login-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;text-align:center}.login-title span{color:#3B82F6}
.login-sub{font-size:11px;color:#64748B;margin-bottom:28px;text-align:center;font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase}
.login-error{background:rgba(220,38,38,.12);color:#F87171;padding:12px;border-radius:6px;margin-bottom:16px;font-size:12px;text-align:center}
.form-label{font-size:11px;color:#94A3B8;text-transform:uppercase;display:block;margin-bottom:6px;font-family:'DM Mono',monospace}
.form-input{width:100%;background:#0D1B2E;border:1px solid #1E3A5F;padding:10px 12px;color:#F1F5F9;border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;margin-bottom:16px}
.form-input:focus{outline:none;border-color:#3B82F6}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── EXPERT ACCESS PASSWORD ──────────────────────────────────────────
// Change this value to set your own Expert Dashboard password.
var EXPERT_PASSWORD='ExpertAccess2026';

var db=window.supabase.createClient('https://nhotxxkehumweboxqkka.supabase.co','sb_publishable_3UKw258JCeGIsInKmz291w_Fc658oH3');

var state={authed:false,loginError:'',page:'dashboard',cases:[],firms:{},selectedCase:null,modelResults:[],loading:true};

function testColor(v){if(!v)return'test-amber';var l=v.toLowerCase();if(l.indexOf('confirmed')>=0||l.indexOf('established')>=0||l.indexOf('clear breach')>=0||l.indexOf('not defensible')>=0)return'test-green';if(l.indexOf('no breach')>=0||l.indexOf('not established')>=0||l.indexOf('fully defensible')>=0)return'test-red';return'test-amber';}
function recClass(r){if(!r)return'rec-borderline';var l=r.toLowerCase();if(l.indexOf('proceed')>=0)return'rec-proceed';if(l.indexOf('not pursue')>=0||l.indexOf('do not')>=0)return'rec-decline';return'rec-borderline';}
function sBadge(s){var m={uploaded:['badge-blue','● Uploaded'],processing:['badge-blue','⟳ Processing'],pending_review:['badge-amber','● Pending Review'],approved:['badge-green','✓ Approved'],rejected:['badge-red','✕ Rejected']};var a=m[s]||['badge-blue',s];return'<span class="badge '+a[0]+'">'+a[1]+'</span>';}

// ── LOGIN GATE ──────────────────────────────────────────────────────
function renderLogin(){
  var app=document.getElementById('app');
  app.innerHTML='<div class="login-screen"><div class="login-card">'+
    '<div class="login-title">MedLegal<span>-AI</span></div>'+
    '<div class="login-sub">Expert Dashboard · Restricted Access</div>'+
    (state.loginError?'<div class="login-error">'+state.loginError+'</div>':'')+
    '<label class="form-label">Access Password</label>'+
    '<input class="form-input" id="expert-pass" type="password" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')tryLogin()">'+
    '<button class="btn btn-primary" style="width:100%" onclick="tryLogin()">Enter Dashboard</button>'+
    '</div></div>';
  setTimeout(function(){var i=document.getElementById('expert-pass');if(i)i.focus();},0);
}

function tryLogin(){
  var v=document.getElementById('expert-pass')?document.getElementById('expert-pass').value:'';
  if(v===EXPERT_PASSWORD){
    state.authed=true;state.loginError='';
    render();
    init();
  }else{
    state.loginError='Incorrect password.';
    renderLogin();
  }
}

async function init(){
  var fr=await db.from('firms').select('*');
  if(fr.data)fr.data.forEach(function(f){state.firms[f.id]=f.name;});
  await loadCases();
  state.loading=false;
  render();
}

async function loadCases(){
  var r=await db.from('cases').select('*').order('created_at',{ascending:false});
  state.cases=r.data||[];
}

function render(){
  if(!state.authed){renderLogin();return;}
  var app=document.getElementById('app');
  var pending=state.cases.filter(function(c){return c.status==='pending_review';}).length;
  var pages={dashboard:'Dashboard',cases:'All Cases',review:'Expert Review',report:state.selectedCase?state.selectedCase.reference:'Report'};

  app.innerHTML='<div class="app"><div class="sidebar"><div class="logo"><div class="logo-text">MedLegal<span>-AI</span></div><div class="logo-sub">Expert Dashboard</div></div>'+
    '<div class="sidebar-content"><div class="nav-section">Analytics</div>'+
    '<div class="nav-item '+(state.page==='dashboard'?'active':'')+'" onclick="changePage(\'dashboard\')">📊 Dashboard</div>'+
    '<div class="nav-item '+(state.page==='cases'?'active':'')+'" onclick="changePage(\'cases\')">📋 All Cases</div>'+
    '<div class="nav-section">Review</div>'+
    '<div class="nav-item '+(state.page==='review'?'active':'')+'" onclick="changePage(\'review\')">⚖ Expert Review'+(pending>0?' <span class="nav-badge">'+pending+'</span>':'')+'</div></div>'+
    '<div class="sidebar-user"><div class="user-avatar">HI</div><div class="user-name">Dr. H. Ildir</div><div class="user-role">MD · LLB · Forensic Sci.</div></div></div>'+
    '<div class="main"><div class="topbar"><div><div class="topbar-title">'+(pages[state.page]||'')+'</div>'+
    '<div class="topbar-sub">'+(state.page==='review'?pending+' cases awaiting review':'')+'</div></div>'+
    (state.page==='report'?'<button class="btn btn-ghost btn-sm" onclick="changePage(\'review\')">← Back</button>':'')+'</div>'+
    '<div class="content">'+(state.loading?'<div class="empty">Loading...</div>':
    (state.page==='dashboard'?renderDashboard():'')+
    (state.page==='cases'?renderCases():'')+
    (state.page==='review'?renderReview():'')+
    (state.page==='report'?renderReport():''))+'</div></div></div>';
}

function renderDashboard(){
  var total=state.cases.length;
  var pending=state.cases.filter(function(c){return c.status==='pending_review';}).length;
  var approved=state.cases.filter(function(c){return c.status==='approved';}).length;
  var scores=state.cases.filter(function(c){return c.risk_score;}).map(function(c){return c.risk_score;});
  var avgScore=scores.length>0?Math.round(scores.reduce(function(a,b){return a+b;},0)/scores.length):0;

  var rows=state.cases.slice(0,8).map(function(c){
    return'<tr style="cursor:pointer" onclick="viewReport(\''+c.id+'\')"><td style="font-family:\'DM Mono\',monospace;font-size:11px;color:#3B82F6">'+c.reference+'</td>'+
      '<td style="font-size:12px;color:#94A3B8">'+(state.firms[c.firm_id]||'Unknown')+'</td>'+
      '<td>'+c.case_type+'</td>'+
      '<td style="font-family:\'Syne\',sans-serif;font-weight:700;color:'+((c.risk_score||0)>=60?'#0D9488':'#D97706')+'">'+(c.risk_score||'—')+'</td>'+
      '<td>'+sBadge(c.status)+'</td></tr>';
  }).join('');

  return'<div class="stats-grid">'+
    '<div class="stat-card"><div class="stat-label">Total Cases</div><div class="stat-value">'+total+'</div></div>'+
    '<div class="stat-card amber"><div class="stat-label">Pending Review</div><div class="stat-value">'+pending+'</div></div>'+
    '<div class="stat-card green"><div class="stat-label">Approved</div><div class="stat-value">'+approved+'</div></div>'+
    '<div class="stat-card teal"><div class="stat-label">Avg Score</div><div class="stat-value">'+avgScore+'</div></div></div>'+
    '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="card-title" style="margin-bottom:0">Recent Cases (All Firms)</div>'+
    '<button class="btn btn-primary btn-sm" onclick="changePage(\'review\')">Review Pending ('+pending+')</button></div>'+
    (total===0?'<div class="empty">No cases yet</div>':'<table><thead><tr><th>Ref</th><th>Firm</th><th>Type</th><th>Score</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>')+'</div>';
}

function renderCases(){
  var rows=state.cases.map(function(c){
    return'<tr style="cursor:pointer" onclick="viewReport(\''+c.id+'\')"><td style="font-family:\'DM Mono\',monospace;font-size:11px;color:#3B82F6">'+c.reference+'</td>'+
      '<td>'+(state.firms[c.firm_id]||'Unknown')+'</td>'+
      '<td>'+c.case_type+'</td>'+
      '<td style="font-family:\'DM Mono\',monospace;font-size:11px;color:#94A3B8">'+new Date(c.created_at).toLocaleDateString()+'</td>'+
      '<td style="font-family:\'Syne\',sans-serif;font-weight:700;color:'+((c.risk_score||0)>=60?'#0D9488':'#D97706')+'">'+(c.risk_score||'—')+'</td>'+
      '<td>'+(c.consistency_score?c.consistency_score+'%':'—')+'</td>'+
      '<td>'+sBadge(c.status)+'</td></tr>';
  }).join('');
  return'<div class="card"><div class="card-title">All Cases</div>'+
    (state.cases.length===0?'<div class="empty">No cases</div>':'<table><thead><tr><th>Ref</th><th>Firm</th><th>Type</th><th>Date</th><th>Score</th><th>Consistency</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>')+'</div>';
}

function renderReview(){
  var pending=state.cases.filter(function(c){return c.status==='pending_review';});
  if(pending.length===0)return'<div class="card"><div class="empty"><div style="font-size:40px;margin-bottom:12px;opacity:.4">✓</div>All clear — no pending reviews</div></div>';
  return pending.map(function(c){
    return'<div class="review-card" onclick="viewReport(\''+c.id+'\')">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
      '<div><div style="font-family:\'DM Mono\',monospace;font-size:11px;color:#3B82F6;margin-bottom:4px">'+c.reference+'</div>'+
      '<div style="font-family:\'Syne\',sans-serif;font-weight:600;font-size:15px;margin-bottom:4px">'+(state.firms[c.firm_id]||'Unknown Firm')+'</div>'+
      '<div style="font-size:12px;color:#94A3B8;margin-bottom:8px">'+c.case_type+' · '+new Date(c.created_at).toLocaleDateString()+'</div>'+
      '<div style="display:flex;gap:8px">'+sBadge(c.status)+
      '<span class="badge badge-blue">Score: '+(c.risk_score||'—')+'</span>'+
      (c.consistency_score?'<span class="badge" style="background:rgba(13,148,136,.15);color:#2DD4BF">Consistency: '+c.consistency_score+'%</span>':'')+'</div></div>'+
      '<button class="btn btn-primary btn-sm">Review →</button></div></div>';
  }).join('');
}

function renderReport(){
  var c=state.selectedCase;if(!c)return'<div class="empty">Case not found</div>';

  var html='<div class="card"><div style="font-family:\'DM Mono\',monospace;font-size:11px;color:#64748B;margin-bottom:8px">EXPERT REVIEW · '+c.reference+' · CONFIDENTIAL</div>'+
    '<div style="font-family:\'Syne\',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px">'+c.case_type+'</div>'+
    '<div style="font-size:12px;color:#94A3B8;margin-bottom:4px">Firm: <strong style="color:#F1F5F9">'+(state.firms[c.firm_id]||'Unknown')+'</strong> · '+new Date(c.created_at).toLocaleDateString()+'</div>'+
    sBadge(c.status)+'</div>';

  html+='<div class="grid-2"><div class="card"><div class="card-title">Risk / Success Score</div>'+
    '<div style="font-family:\'Syne\',sans-serif;font-size:48px;font-weight:800;color:'+((c.risk_score||0)>=60?'#0D9488':'#D97706')+';letter-spacing:-1px">'+(c.risk_score||'—')+'<span style="font-size:16px;color:#94A3B8">/100</span></div>'+
    (c.expert_notes?'<div style="font-size:12px;color:#94A3B8;margin-top:6px">'+c.expert_notes+'</div>':'')+'</div>'+
    '<div class="card"><div class="card-title">Model Consistency</div>'+
    '<div style="font-family:\'Syne\',sans-serif;font-size:48px;font-weight:800;color:#3B82F6;letter-spacing:-1px">'+(c.consistency_score?c.consistency_score+'%':'—')+'</div>'+
    '<div style="font-size:12px;color:#94A3B8;margin-top:6px">Agreement between '+state.modelResults.length+' AI models</div></div></div>';

  if(c.case_summary){
    html+='<div class="card"><div class="card-title">Case Summary (Anonymised)</div><p style="color:#94A3B8;font-size:13px;line-height:1.6">'+c.case_summary+'</p></div>';
  }

  if(state.modelResults.length>0){
    var modelHtml=state.modelResults.map(function(r){
      return'<div class="model-card">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
        '<div style="font-family:\'DM Mono\',monospace;font-size:12px;color:#3B82F6;font-weight:500">'+r.model_name.toUpperCase()+'</div>'+
        '<div style="font-family:\'Syne\',sans-serif;font-size:24px;font-weight:800;color:'+((r.score||0)>=60?'#0D9488':'#D97706')+'">'+r.score+'<span style="font-size:11px;color:#64748B">/100</span></div></div>'+
        '<div class="legal-test"><span style="color:#94A3B8">Duty of Care</span><span class="'+testColor(r.duty_of_care)+'">'+(r.duty_of_care||'—')+'</span></div>'+
        '<div class="legal-test"><span style="color:#94A3B8">Breach (Bolam)</span><span class="'+testColor(r.breach_bolam)+'">'+(r.breach_bolam||'—')+'</span></div>'+
        '<div class="legal-test"><span style="color:#94A3B8">Bolitho Defensibility</span><span class="'+testColor(r.bolitho_defensibility)+'">'+(r.bolitho_defensibility||'—')+'</span></div>'+
        '<div class="legal-test"><span style="color:#94A3B8">Causation</span><span class="'+testColor(r.causation)+'">'+(r.causation||'—')+'</span></div>'+
        (r.recommendation?'<div class="rec-box '+recClass(r.recommendation)+'" style="margin-top:10px">'+r.recommendation+'</div>':'')+
        (r.reasoning?'<div class="reasoning-box"><strong style="color:#F1F5F9">AI Analysis:</strong> '+r.reasoning+'</div>':'')+'</div>';
    }).join('');
    html+='<div class="card"><div class="card-title">Model-by-Model Analysis</div>'+
      '<p style="font-size:11px;color:#64748B;margin-bottom:14px">Each AI model independently assessed the case under UK clinical negligence law (Bolam/Bolitho framework)</p>'+modelHtml+'</div>';
  }

  if(c.status==='pending_review'){
    html+='<div class="card" style="border-color:#D97706"><div class="card-title" style="color:#FCD34D">⚖ Expert Review Panel</div>'+
      '<div style="margin-bottom:14px"><label style="font-size:11px;color:#94A3B8;display:block;margin-bottom:6px;font-family:\'DM Mono\',monospace">EXPERT NOTES</label>'+
      '<textarea id="expert-notes" class="form-textarea" placeholder="Write your clinical and legal assessment. Reference specific aspects of the AI analysis, note any disagreements with the models, and provide your professional opinion..."></textarea></div>'+
      '<div style="display:flex;gap:10px"><button class="btn btn-teal" onclick="approveCase(\''+c.id+'\')">✓ Approve & Sign Off</button>'+
      '<button class="btn btn-red" onclick="rejectCase(\''+c.id+'\')">✕ Reject Case</button></div></div>';
  }

  if(c.status==='approved'){
    html+='<div class="card" style="border-color:#059669"><div class="card-title" style="color:#34D399">✓ Approved</div>'+
      '<p style="color:#94A3B8;font-size:13px">This case has been approved and the law firm has been notified.</p></div>';
  }
  if(c.status==='rejected'){
    html+='<div class="card" style="border-color:#DC2626"><div class="card-title" style="color:#F87171">✕ Rejected</div>'+
      '<p style="color:#94A3B8;font-size:13px">This case has been rejected. The law firm has been notified.</p></div>';
  }

  return html;
}

async function viewReport(id){
  state.selectedCase=state.cases.find(function(c){return c.id===id;});
  var r=await db.from('model_results').select('*').eq('case_id',id);
  state.modelResults=r.data||[];
  state.page='report';render();
}

async function approveCase(id){
  var notes=document.getElementById('expert-notes')?document.getElementById('expert-notes').value:'';
  await db.from('cases').update({status:'approved',expert_notes:notes||'Approved by expert',updated_at:new Date().toISOString()}).eq('id',id);
  await loadCases();
  state.selectedCase=state.cases.find(function(c){return c.id===id;});
  render();
}

async function rejectCase(id){
  var notes=document.getElementById('expert-notes')?document.getElementById('expert-notes').value:'';
  await db.from('cases').update({status:'rejected',expert_notes:notes||'Rejected by expert',updated_at:new Date().toISOString()}).eq('id',id);
  await loadCases();
  state.selectedCase=state.cases.find(function(c){return c.id===id;});
  render();
}

function changePage(p){state.page=p;render();}

// Start at the login gate — no data loads until correct password entered
renderLogin();
</script>

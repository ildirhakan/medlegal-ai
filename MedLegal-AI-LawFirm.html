<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0D1B2E;color:#F1F5F9;font-family:'DM Sans',sans-serif}

.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif}

.topbar{padding:20px 28px;border-bottom:1px solid #1E3A5F;background:#142236}.topbar-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.topbar-sub{font-size:12px;color:#94A3B8;margin-top:2px;font-family:'DM Mono',monospace}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.card{background:#142236;border:1px solid #1E3A5F;border-radius:10px;padding:20px;margin-bottom:14px}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#142236;border:1px solid #1E3A5F;border-radius:10px;padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#3B82F6}
.stat-card.amber::before{background:#D97706}.stat-card.green::before{background:#059669}.stat-card.red::before{background:#DC2626}
.stat-label{font-size:10px;color:#64748B;font-family:'DM Mono',monospace;margin-bottom:8px}.stat-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:700}
.upload-zone{border:2px dashed #1E3A5F;border-radius:10px;padding:48px 24px;text-align:center;cursor:pointer}.upload-zone:hover{border-color:#3B82F6;background:rgba(59,130,246,.1)}
table{width:100%;border-collapse:collapse}th{text-align:left;padding:10px 0;border-bottom:1px solid #1E3A5F;font-size:10px;text-transform:uppercase;color:#64748B;font-family:'DM Mono',monospace}
td{padding:12px 0;border-bottom:1px solid rgba(30,58,95,.5);font-size:13px}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-family:'DM Mono',monospace}
.badge-blue{background:rgba(59,130,246,.15);color:#3B82F6}.badge-green{background:rgba(5,150,105,.15);color:#34D399}
.badge-amber{background:rgba(217,119,6,.15);color:#FCD34D}.badge-red{background:rgba(220,38,38,.15);color:#F87171}
.empty{text-align:center;padding:48px 24px;color:#94A3B8}
.pipeline-step{display:flex;gap:14px;padding:12px 0}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;border:2px solid;flex-shrink:0}
.step-circle.done{background:rgba(5,150,105,.15);border-color:#059669;color:#34D399}
.step-circle.active{background:rgba(59,130,246,.15);border-color:#3B82F6;color:#3B82F6;animation:pulse 1.5s infinite}
.step-circle.pending{border-color:#1E3A5F;color:#64748B}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-bar{height:4px;background:#1E3A5F;border-radius:2px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;background:linear-gradient(90deg,#3B82F6,#0D9488);transition:width .5s}
.file-item{display:flex;align-items:center;gap:10px;padding:10px;background:#0D1B2E;border-radius:6px;margin-bottom:8px;border:1px solid #1E3A5F}

<script>
var SUPABASE_URL='https://nhotxxkehumweboxqkka.supabase.co',SUPABASE_KEY='sb_publishable_3UKw258JCeGIsInKmz291w_Fc658oH3';
var AI_KEYS={openai:'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',gemini:'AIzaSyCIgMWJnzW3rSxhZmaYOMoreeNuvbcSUhI',deepseek:'sk-c5de9b4e4f214bbc8b3a2251473551c1'};
var db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function anonymisePII(t){if(!t)return t;return t.replace(/\b\d{3}[\s-]?\d{3}[\s-]?\d{4}\b/g,'[NHS-REDACTED]').replace(/\b[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}\b/gi,'[POSTCODE-REDACTED]').replace(/\b\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4}\b/g,'[DOB-REDACTED]').replace(/\b[\w.-]+@[\w.-]+\.\w{2,}\b/g,'[EMAIL-REDACTED]').replace(/\b(?:0|\+44)\s*\d[\d\s]{8,12}\b/g,'[PHONE-REDACTED]');}

function buildPrompt(ct,cs){return 'You are a UK clinical negligence legal analyst. Analyse this case under UK law.\n\nCASE TYPE: '+ct+'\nCASE SUMMARY: '+anonymisePII(cs)+'\n\nApply these legal tests:\n1. DUTY OF CARE: Confirmed / Arguable / Not Established\n2. BREACH (BOLAM TEST): Clear Breach / Arguable Breach / No Breach\n3. BOLITHO DEFENSIBILITY: Not Defensible / Partially Defensible / Fully Defensible\n4. CAUSATION: Established / Arguable / Not Established\n5. OVERALL RISK SCORE: 0-100\n6. RECOMMENDATION: "Proceed to Expert Report" / "Borderline - Consider Further" / "Do Not Pursue"\n7. DETAILED REASONING: 4-6 sentence analysis.\n\nRespond ONLY in JSON:\n{"duty_of_care":"string","breach_bolam":"string","bolitho_defensibility":"string","causation":"string","risk_score":0,"recommendation":"string","reasoning":"string"}';}

async function callGPT4(p){try{var r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+AI_KEYS.openai},body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:p}],temperature:.3,max_tokens:1200})});var d=await r.json();if(d.error)throw new Error(d.error.message);return JSON.parse(d.choices[0].message.content.replace(/```json|```/g,'').trim());}catch(e){console.error('GPT4:',e);return null;}}
async function callGemini(p){try{var r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+AI_KEYS.gemini,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:p}]}],generationConfig:{temperature:.3,maxOutputTokens:1200}})});var d=await r.json();if(d.error)throw new Error(d.error.message);return JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim());}catch(e){console.error('Gemini:',e);return null;}}
async function callDeepSeek(p){try{var r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+AI_KEYS.deepseek},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:p}],temperature:.3,max_tokens:1200})});var d=await r.json();if(d.error)throw new Error(d.error.message);return JSON.parse(d.choices[0].message.content.replace(/```json|```/g,'').trim());}catch(e){console.error('DeepSeek:',e);return null;}}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

async function runPipeline(ct,cs,caseId,onStep){
  var prompt=buildPrompt(ct,cs),results={};
  onStep(1,'PII Anonymisation complete');await sleep(500);
  onStep(2,'Gemini analysing...');results.gemini=await callGemini(prompt);
  onStep(3,'Cross-validating...');await sleep(500);
  onStep(4,'DeepSeek analysing...');results.deepseek=await callDeepSeek(prompt);
  onStep(5,'Preparing for expert...');await sleep(300);
  var valid=[];for(var k in results){if(results[k])valid.push([k,results[k]]);}
  var avg=0,con=0;
  if(valid.length>0){var sc=valid.map(function(v){return v[1].risk_score;});avg=Math.round(sc.reduce(function(a,b){return a+b;},0)/sc.length);if(sc.length>1){var m=sc.reduce(function(a,b){return a+b;},0)/sc.length;var v2=sc.reduce(function(a,s){return a+Math.pow(s-m,2);},0)/sc.length;con=Math.round(Math.max(0,100-Math.sqrt(v2)*2));}else con=75;}
  for(var i=0;i<valid.length;i++){var mo=valid[i][0],re=valid[i][1];await db.from('model_results').insert({case_id:caseId,model_name:mo,score:re.risk_score,duty_of_care:re.duty_of_care,breach_bolam:re.breach_bolam,bolitho_defensibility:re.bolitho_defensibility,causation:re.causation,reasoning:re.reasoning||'',recommendation:re.recommendation||''});}
  var rec=avg>=65?'Proceed to Expert Report':avg>=40?'Borderline - Consider Further':'Do Not Pursue';
  await db.from('cases').update({risk_score:avg,consistency_score:con,status:'pending_review',expert_notes:rec,updated_at:new Date().toISOString()}).eq('id',caseId);
  onStep(6,'Complete');return{avgScore:avg,consistency:con,recommendation:rec};
}

var state={loggedIn:false,firmId:null,firmName:null,page:'dashboard',cases:[],selectedCase:null,pipelineStep:0,pipelineMsg:'',pipelineResult:null,error:''};

function render(){var app=document.getElementById('app');if(!state.loggedIn){app.innerHTML=renderLogin();setTimeout(attachLoginListeners,0);}else{app.innerHTML=renderApp();setTimeout(attachAppListeners,0);}}
function sBadge(s){var m={uploaded:['badge-blue','● Uploaded'],processing:['badge-blue','⟳ Processing'],pending_review:['badge-amber','● Under Review'],approved:['badge-green','✓ Report Ready'],rejected:['badge-red','✕ Not Recommended']};var a=m[s]||['badge-blue',s];return '<span class="badge '+a[0]+'">'+a[1]+'</span>';}

function renderLogin(){return '<div class="login-screen"><div class="login-card"><div class="login-title">MedLegal<span>-AI</span></div><div class="login-sub">Law Firm Portal</div>'+(state.error?'<div class="login-error">'+state.error+'</div>':'')+'<form id="login-form"><div class="form-group"><label class="form-label">Email</label><input class="form-input" id="email" type="email" placeholder="your@lawfirm.co.uk" required></div><div class="form-group"><label class="form-label">Password</label><input class="form-input" id="password" type="password" placeholder="••••••••" required></div><button class="btn btn-primary" type="submit" style="width:100%">Sign In</button></form><div class="login-hint">Demo: harrison@harrisoncole.co.uk / password123</div></div></div>';}

function renderApp(){
  return '<div class="app"><div class="sidebar"><div class="logo"><div class="logo-text">MedLegal<span>-AI</span></div><div class="logo-sub">Law Firm Portal</div></div><div class="sidebar-content"><div class="nav-section">Main</div><div class="nav-item '+(state.page==='dashboard'?'active':'')+'" onclick="changePage(\'dashboard\')">📈 Overview</div><div class="nav-item '+(state.page==='cases'?'active':'')+'" onclick="changePage(\'cases\')">📋 My Cases <span class="nav-badge">'+state.cases.length+'</span></div><div class="nav-item '+(state.page==='upload'?'active':'')+'" onclick="changePage(\'upload\')">↑ Upload Case</div></div><div class="sidebar-user"><div class="user-name">'+state.firmName+'</div><div class="user-role">Law Firm Account</div><button class="btn btn-ghost btn-sm" onclick="logout()" style="width:100%;margin-top:8px">Sign Out</button></div></div><div class="main"><div class="topbar"><div class="topbar-title">'+(state.page==='dashboard'?'Overview':state.page==='cases'?'My Cases':state.page==='upload'?'Upload New Case':state.page==='processing'?'Processing':state.page==='report'?(state.selectedCase?state.selectedCase.reference:''):'')+'</div></div><div class="content">'+(state.page==='dashboard'?renderDashboard():'')+(state.page==='cases'?renderCases():'')+(state.page==='upload'?renderUpload():'')+(state.page==='processing'?renderProcessing():'')+(state.page==='report'?renderReport():'')+'</div></div></div>';
}

function renderDashboard(){
  var p=state.cases.filter(function(c){return c.status==='pending_review';}).length,a=state.cases.filter(function(c){return c.status==='approved';}).length,r=state.cases.filter(function(c){return c.status==='rejected';}).length;
  var rows=state.cases.slice(0,5).map(function(c){return '<tr><td style="font-family:\'DM Mono\',monospace;font-size:11px;color:#3B82F6">'+c.reference+'</td><td style="font-size:12px;color:#94A3B8">'+c.case_type+'</td><td>'+sBadge(c.status)+'</td><td><button class="btn btn-ghost btn-sm" onclick="viewReport(\''+c.id+'\')">View</button></td></tr>';}).join('');
  return '<div class="stats-grid"><div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">'+state.cases.length+'</div></div><div class="stat-card amber"><div class="stat-label">Under Review</div><div class="stat-value">'+p+'</div></div><div class="stat-card green"><div class="stat-label">Reports Ready</div><div class="stat-value">'+a+'</div></div><div class="stat-card red"><div class="stat-label">Not Recommended</div><div class="stat-value">'+r+'</div></div></div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="card-title" style="margin-bottom:0">Recent Cases</div><button class="btn btn-primary btn-sm" onclick="changePage(\'upload\')">+ Upload</button></div>'+(state.cases.length===0?'<div class="empty">No cases yet</div>':'<table><thead><tr><th>Ref</th><th>Type</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>')+'</div>';
}

function renderCases(){

  return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="card-title" style="margin-bottom:0">All Cases</div><button class="btn btn-primary btn-sm" onclick="changePage(\'upload\')">+ Upload</button></div>'+(state.cases.length===0?'<div class="empty">No cases yet</div>':'<table><thead><tr><th>Ref</th><th>Type</th><th>Date</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>')+'</div>';
}

function renderUpload(){return '<div style="max-width:720px"><div class="card"><div class="card-title">Submit New Case</div><form id="upload-form"><div class="form-group"><label class="form-label">Case Type *</label><select id="case-type" class="form-select" required><option value="">Select...</option><option>Surgical Negligence</option><option>Medication Error</option><option>Delayed Diagnosis</option><option>GP Negligence</option><option>Birth Injury</option><option>Anaesthesia Error</option><option>Hospital Acquired Infection</option></select></div><div class="form-group"><label class="form-label">Case Summary *</label><textarea id="case-summary" class="form-textarea" placeholder="Describe what happened, when, which hospital/doctor, what injuries resulted..." required></textarea></div><div class="form-group"><label class="form-label">Supporting Documents (Optional)</label><div class="upload-zone" onclick="document.getElementById(\'file-input\').click()"><div style="font-size:14px;margin-bottom:6px">📁 Click to upload</div><div style="font-size:11px;color:#94A3B8">PDF, JPG, PNG</div></div><input id="file-input" type="file" multiple style="display:none"></div><div id="file-list"></div><div class="privacy-note"><strong style="color:#2DD4BF">🔒 Privacy:</strong> All patient data is automatically anonymised before analysis.</div><button class="btn btn-primary" type="submit" style="width:100%">Submit for Analysis →</button></form></div></div>';}

function renderProcessing(){
  var steps=[{n:'Secure Upload'},{n:'PII Anonymisation'},{n:'AI Pre-Screening'},{n:'Cross-Validation'},{n:'Queued for Expert'},{n:'Complete'}];
  var prog=Math.round((state.pipelineStep/6)*100);
  var sh=steps.map(function(s,i){var st=i<state.pipelineStep?'done':i===state.pipelineStep?'active':'pending';return '<div class="pipeline-step"><div class="step-circle '+st+'">'+(st==='done'?'✓':(i+1))+'</div><div style="padding-top:8px;font-size:13px;font-weight:500">'+s.n+'</div></div>';}).join('');
  var rh='';if(state.pipelineResult){rh='<div class="card" style="border-color:#059669"><div class="card-title" style="color:#34D399">✓ Submitted for Expert Review</div><p style="color:#94A3B8;font-size:13px;margin-bottom:14px">Your case has been pre-screened and queued for expert review. You will receive a signed report within 24-48 hours.</p><button class="btn btn-primary" onclick="changePage(\'cases\')" style="width:100%">View My Cases →</button></div>';}
  return '<div style="max-width:720px"><div class="card"><div class="card-title">Processing</div><div style="display:flex;justify-content:space-between;font-size:11px;color:#94A3B8;margin-bottom:6px"><span>'+state.pipelineMsg+'</span><span>'+prog+'%</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+prog+'%"></div></div>'+sh+'</div>'+rh+'</div>';
}

function renderReport(){
  var c=state.selectedCase;if(!c)return '<div class="empty">Not found</div>';
  var msg='';
  if(c.status==='pending_review') msg='<div class="card"><div class="card-title">⏳ Under Expert Review</div><p style="color:#94A3B8;font-size:13px;line-height:1.6">Your case is being reviewed by our expert panel (qualified MD and Lawyer). You will receive a signed report within 24-48 hours.</p></div>';
  else if(c.status==='approved') msg='<div class="card" style="border-color:#059669"><div class="card-title" style="color:#34D399">✓ Expert Report Ready</div><p style="color:#94A3B8;font-size:13px;margin-bottom:14px">Your case has been reviewed and approved. Download the full signed report below.</p><button class="btn btn-primary">📥 Download Expert Report (PDF)</button></div>';
  else if(c.status==='rejected') msg='<div class="card" style="border-color:#DC2626"><div class="card-title" style="color:#F87171">✕ Not Recommended</div><p style="color:#94A3B8;font-size:13px">After expert review, this case does not have sufficient merit to proceed. Contact us to discuss further.</p></div>';
  return '<div><button class="btn btn-ghost btn-sm" onclick="changePage(\'cases\')" style="margin-bottom:14px">← Back</button><div class="card"><div style="font-family:\'DM Mono\',monospace;font-size:11px;color:#64748B;margin-bottom:8px">CASE · '+c.reference+'</div><div style="font-family:\'Syne\',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px">'+c.case_type+'</div><div style="font-size:12px;color:#94A3B8;margin-bottom:12px">Submitted: '+new Date(c.created_at).toLocaleDateString()+'</div>'+sBadge(c.status)+'</div>'+msg+'</div>';
}

function attachLoginListeners(){var f=document.getElementById('login-form');if(f)f.addEventListener('submit',handleLogin);}
function attachAppListeners(){var f=document.getElementById('upload-form');if(f){f.addEventListener('submit',handleUpload);var fi=document.getElementById('file-input');if(fi)fi.addEventListener('change',updateFileList);}}

async function handleLogin(e){e.preventDefault();state.error='';var em=document.getElementById('email').value,pw=document.getElementById('password').value;if(em==='harrison@harrisoncole.co.uk'&&pw==='password123'){var r=await db.from('firms').select('*').eq('email',em).single();if(r.data){state.loggedIn=true;state.firmId=r.data.id;state.firmName=r.data.name;state.page='dashboard';await loadCases();render();}else{state.error='Firm not found.';render();}}else{state.error='Invalid credentials.';render();}}

async function handleUpload(e){e.preventDefault();var ct=document.getElementById('case-type').value,cs=document.getElementById('case-summary').value;if(!ct||!cs){alert('Fill in case type and summary');return;}var num=state.cases.length+1,ref='MAI-2026-'+String(num).padStart(4,'0');var r=await db.from('cases').insert({reference:ref,firm_id:state.firmId,case_type:ct,case_summary:cs,status:'processing'}).select().single();if(r.error){alert('Error: '+r.error.message);return;}state.page='processing';state.pipelineStep=0;state.pipelineMsg='Starting...';state.pipelineResult=null;render();var result=await runPipeline(ct,cs,r.data.id,function(step,msg){state.pipelineStep=step;state.pipelineMsg=msg;render();});state.pipelineResult=result;render();await loadCases();}

function updateFileList(){var files=document.getElementById('file-input').files,list=document.getElementById('file-list');if(!list)return;list.innerHTML='';Array.from(files).forEach(function(f){var d=document.createElement('div');d.className='file-item';d.innerHTML='<span>📄</span><div style="flex:1"><div style="font-size:12px">'+f.name+'</div></div><span class="badge badge-green">Ready</span>';list.appendChild(d);});}

async function loadCases(){var r=await db.from('cases').select('*').eq('firm_id',state.firmId).order('created_at',{ascending:false});state.cases=r.data||[];}
async function viewReport(id){state.selectedCase=state.cases.find(function(c){return c.id===id;});state.page='report';render();}
function changePage(p){state.page=p;state.pipelineResult=null;render();}
function logout(){state={loggedIn:false,firmId:null,firmName:null,page:'dashboard',cases:[],selectedCase:null,pipelineStep:0,pipelineMsg:'',pipelineResult:null,error:''};render();}
render();
</script>
</body>
</html>
